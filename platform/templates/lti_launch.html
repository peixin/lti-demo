<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Launching…</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
<section class="section">
  <div class="container has-text-centered">
    <p class="subtitle">Launching tool, please wait…</p>
    <progress class="progress is-primary" max="100" style="max-width:400px;margin:auto"></progress>

    <form id="lti-form" method="post" action="{{ launch_url }}">
      {% for k, v in params.items() %}
      <input type="hidden" name="{{ k }}" value="{{ v }}">
      {% endfor %}
    </form>

    <script>
      // Auto-submit after a brief moment so the user sees the spinner
      setTimeout(function() {
        document.getElementById('lti-form').submit();
      }, 400);
    </script>
  </div>
</section>
</body>
</html>
