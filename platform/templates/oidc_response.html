<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Launching…</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
<section class="section">
  <div class="container has-text-centered">
    <p class="subtitle">Launching tool via LTI 1.3…</p>
    <progress class="progress is-info" max="100" style="max-width:400px;margin:auto"></progress>

    <form id="f" method="post" action="{{ redirect_uri }}">
      <input type="hidden" name="id_token" value="{{ id_token }}">
      <input type="hidden" name="state"    value="{{ state }}">
    </form>
    <script>setTimeout(function(){ document.getElementById('f').submit(); }, 300);</script>
  </div>
</section>
</body>
</html>
